# Stage0 Launch — Flask UI (detached: use `pipenv run compose-up` or `docker compose up --build -d`).
services:
  launch:
    image: ghcr.io/agile-learning-institute/stage0_launch:latest
    build: .
    container_name: stage0_launch
    ports:
      - "${LAUNCH_HOST_PORT:-8080}:8080"
    environment:
      # Prefer GITHUB_TOKEN; GH_TOKEN alone is enough if you use `gh auth` (see README).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-${GH_TOKEN:?GITHUB_TOKEN or GH_TOKEN must be set}}
      # Prefer GITHUB_USERNAME; host may set only GH_USERNAME (legacy).
      GITHUB_USERNAME: ${GITHUB_USERNAME:-${GH_USERNAME:-}}
      # Lets nested merge resolve the real bind source via ``docker inspect`` (not fragile findmnt paths on Desktop).
      STAGE0_LAUNCH_CONTAINER_NAME: stage0_launch
    volumes:
      - ${LAUNCHPAD_HOST:-..}:/Launchpad
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
