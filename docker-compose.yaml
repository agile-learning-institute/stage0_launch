# Stage0 Launch — Flask UI (detached: use `pipenv run compose-up` or `docker compose up --build -d`).
services:
  launch:
    image: ghcr.io/agile-learning-institute/stage0_launch:latest
    build: .
    container_name: stage0_launch
    ports:
      - "${LAUNCH_HOST_PORT:-8080}:8080"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set}
      GH_TOKEN: ${GITHUB_TOKEN}
      GH_USERNAME: ${GH_USERNAME:-}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-}
    volumes:
      - ${LAUNCHPAD_HOST:-..}:/Launchpad
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
