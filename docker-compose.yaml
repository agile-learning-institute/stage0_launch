# Stage0 Launch — run once: umbrella repo, merge, publish, `make launch-all` (service repos + images).
# Run from repo root: `make run` (sets HOST_* mounts). Export GITHUB_TOKEN first; see README.
# Optional: mount SSH for umbrella `make validate` Git SSH check, e.g. -v ~/.ssh:/root/.ssh:ro

services:
  launch:
    build: .
    image: stage0_launch:latest
    container_name: stage0_launch
    environment:
      SPECIFICATIONS: /specifications
      HOST_SPECIFICATIONS: ${HOST_SPECIFICATIONS}
      LAUNCHPAD_DIR: /launchpad
      HOST_LAUNCHPAD: ${HOST_LAUNCHPAD}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set. See README.md}
      GH_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - ./Specifications:/specifications
      - ${HOST_LAUNCHPAD}:/launchpad
      - /var/run/docker.sock:/var/run/docker.sock
    # Container runs launch.sh then exits (stdout/stderr to host)
    restart: "no"
