# Example product.yaml — replace with the file from your Stage0 Architect conversation.
# Required: info.name, info.slug, info.base_port, organization.git_org, etc.

info:
  name: Example Product
  description: Example product for Stage0 Launch (replace with your own).
  slug: example (Short one-word name used as a prefix)
  developer_cli: ep (Short two-character command used by engineers)
  db_name: example_db (Database name for MongoDB) 
  base_port: 9080 (Starting port for all services, each repo get's own port)

organization:
  name: Your Organization
  email: info@example.com (Organization email address)
  founded: 2024 (Year organization was founded)
  slug: your-org (Short one-word name used as a prefix)
  git_host: https://github.com (Git hosting provider, only tested with GitHub)
  git_org: your-org (Git organization name, only tested with GitHub)
  docker_host: ghcr.io (Docker hosting provider, only tested with GitHub Container Registry)
  docker_org: your-org (Docker organization name, only tested with GitHub Container Registry)
